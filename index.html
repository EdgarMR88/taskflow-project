<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskMaster Pro - Gestión Avanzada de Tareas</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  <div class="app-container">
      <header class="main-header">
          <div class="header-content">
              <h1><i class="fas fa-tasks"></i> TaskMaster Pro</h1>
              <div class="header-stats">
                  <span class="stat-item">
                      <i class="fas fa-list-check"></i>
                      <span id="total-tasks">0</span> Tareas
                  </span>
                  <span class="stat-item">
                      <i class="fas fa-check-circle"></i>
                      <span id="completed-tasks">0</span> Completadas
                  </span>
              </div>
          </div>
      </header>

      <main class="contenedor-principal">
          <aside class="sidebar">
              <div class="task-form-container">
                  <h3><i class="fas fa-plus-circle"></i> Nueva Tarea</h3>
                  <form id="task-form" class="task-form">
                      <div class="form-group">
                          <input type="text" id="task-input" placeholder="¿Qué necesitas hacer?" required>
                      </div>
                      <div class="form-group">
                          <select id="task-priority">
                              <option value="baja">🟢 Prioridad Baja</option>
                              <option value="media" selected>🟡 Prioridad Media</option>
                              <option value="alta">🔴 Prioridad Alta</option>
                          </select>
                      </div>
                      <div class="form-group">
                          <select id="task-category">
                              <option value="personal">👤 Personal</option>
                              <option value="trabajo">💼 Trabajo</option>
                              <option value="hogar">🏠 Hogar</option>
                              <option value="salud">🏥 Salud</option>
                              <option value="estudios">📚 Estudios</option>
                          </select>
                      </div>
                      <button type="submit" class="btn-primary">
                          <i class="fas fa-plus"></i> Añadir Tarea
                      </button>
                  </form>
              </div>

              <div class="filters-container">
                  <h3><i class="fas fa-filter"></i> Filtros</h3>
                  <div class="search-container">
                      <i class="fas fa-search"></i>
                      <input type="text" id="search-input" placeholder="Buscar tareas...">
                  </div>
                  
                  <div class="filter-buttons">
                      <button class="filter-btn active" data-filter="todas">Todas</button>
                      <button class="filter-btn" data-filter="pendientes">Pendientes</button>
                      <button class="filter-btn" data-filter="completadas">Completadas</button>
                  </div>

                  <div class="category-filters">
                      <h4>Por Categoría</h4>
                      <button class="category-filter active" data-category="todas">Todas</button>
                      <button class="category-filter" data-category="personal">Personal</button>
                      <button class="category-filter" data-category="trabajo">Trabajo</button>
                      <button class="category-filter" data-category="hogar">Hogar</button>
                      <button class="category-filter" data-category="salud">Salud</button>
                      <button class="category-filter" data-category="estudios">Estudios</button>
                  </div>
              </div>

              <div class="actions-container">
                  <button id="clear-completed" class="btn-secondary">
                      <i class="fas fa-trash"></i> Limpiar Completadas
                  </button>
                  <button id="export-tasks" class="btn-secondary">
                      <i class="fas fa-download"></i> Exportar Tareas
                  </button>
              </div>
          </aside>

          <section class="tasks-section">
              <div class="tasks-header">
                  <h2>Mis Tareas</h2>
                  <div class="view-toggle">
                      <button id="grid-view" class="view-btn active">
                          <i class="fas fa-th"></i>
                      </button>
                      <button id="list-view" class="view-btn">
                          <i class="fas fa-list"></i>
                      </button>
                  </div>
              </div>

              <div id="empty-state" class="empty-state">
                  <i class="fas fa-clipboard-list"></i>
                  <h3>¡No hay tareas!</h3>
                  <p>Crea tu primera tarea para comenzar</p>
              </div>

              <ul id="task-list" class="task-grid">
                  <!-- Las tareas se insertarán aquí dinámicamente -->
              </ul>
          </section>
      </main>
  </div>

  <!-- Modal para editar tareas -->
  <div id="edit-modal" class="modal">
      <div class="modal-content">
          <div class="modal-header">
              <h3>Editar Tarea</h3>
              <button class="close-modal">&times;</button>
          </div>
          <form id="edit-form">
              <div class="form-group">
                  <label>Título de la tarea</label>
                  <input type="text" id="edit-task-input" required>
              </div>
              <div class="form-group">
                  <label>Prioridad</label>
                  <select id="edit-task-priority">
                      <option value="baja">🟢 Prioridad Baja</option>
                      <option value="media">🟡 Prioridad Media</option>
                      <option value="alta">🔴 Prioridad Alta</option>
                  </select>
              </div>
              <div class="form-group">
                  <label>Categoría</label>
                  <select id="edit-task-category">
                      <option value="personal">👤 Personal</option>
                      <option value="trabajo">💼 Trabajo</option>
                      <option value="hogar">🏠 Hogar</option>
                      <option value="salud">🏥 Salud</option>
                      <option value="estudios">📚 Estudios</option>
                  </select>
              </div>
              <div class="modal-actions">
                  <button type="button" class="btn-secondary" id="cancel-edit">Cancelar</button>
                  <button type="submit" class="btn-primary">Guardar Cambios</button>
              </div>
          </form>
      </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
