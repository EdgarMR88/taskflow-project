<!DOCTYPE html>
<html lang="es" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickTask - Gestión Rápida de Tareas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#faf9ff',
              100: '#f1efff', 
              200: '#ddd6fe',
              300: '#a29bfe',
              400: '#8b7cf6',
              500: '#6c5ce7',
              600: '#5f3dc4',
              700: '#4c2da6',
              800: '#3b1f8a',
              900: '#2a1370'
            },
            lightning: '#f1c40f',
            success: '#00b894',
            warning: '#fdcb6e', 
            danger: '#e17055'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gradient-to-br from-purple-50 to-white dark:from-gray-900 dark:to-gray-800 text-gray-800 dark:text-gray-100 min-h-screen transition-colors duration-500">
  
  <!-- Header -->
  <header class="bg-gradient-to-r from-primary-500 to-primary-600 dark:from-primary-700 dark:to-primary-800 text-white p-6 shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <h1 class="text-3xl font-bold flex items-center gap-3">
        <i class="fas fa-bolt text-lightning animate-pulse"></i>
        QuickTask
      </h1>
      
      <div class="flex items-center gap-4">
        <!-- Stats -->
        <div class="hidden sm:flex gap-3 text-sm">
          <div class="bg-white/20 px-3 py-1.5 rounded-lg backdrop-blur-sm">
            <i class="fas fa-list-check mr-1"></i>
            <span id="total-tasks">0 Tareas</span>
          </div>
          <div class="bg-white/20 px-3 py-1.5 rounded-lg backdrop-blur-sm">
            <i class="fas fa-circle-check mr-1"></i>
            <span id="completed-tasks">0 Completadas</span>
          </div>
        </div>
        
        <!-- Theme Toggle -->
        <button id="theme-toggle" 
                class="p-2 rounded-lg bg-white/20 hover:bg-white/30 transition-all duration-300 hover:scale-110">
          <i class="fas fa-moon dark:hidden text-lg"></i>
          <i class="fas fa-sun hidden dark:block text-lg text-lightning"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto p-6 flex flex-col lg:flex-row gap-6">
    
    <!-- Sidebar -->
    <aside class="lg:w-80 space-y-6">
      
      <!-- Add Task Form -->
      <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700">
        <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
          <i class="fas fa-bolt text-lightning"></i>
          Nueva Tarea Rápida
        </h3>
        
        <form id="task-form" class="space-y-4">
          <input type="text" 
                 id="task-input" 
                 placeholder="¿Qué necesitas hacer rápidamente?"
                 class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg 
                        bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100
                        focus:ring-2 focus:ring-primary-500 focus:border-primary-500 
                        transition-all duration-300"
                 required>
          
          <select id="task-priority" 
                  class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg 
                         bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100
                         focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
            <option value="media">⚡ Prioridad Media</option>
            <option value="alta">🔴 Prioridad Alta</option>
            <option value="baja">🟢 Prioridad Baja</option>
          </select>
          
          <select id="task-category" 
                  class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg 
                         bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100
                         focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
            <option value="personal">👤 Personal</option>
            <option value="trabajo">💼 Trabajo</option>
            <option value="hogar">🏠 Hogar</option>
            <option value="salud">🏥 Salud</option>
            <option value="estudios">📚 Estudios</option>
          </select>
          
          <button type="submit" 
                  class="w-full bg-gradient-to-r from-primary-500 to-primary-600 
                         hover:from-primary-600 hover:to-primary-700 
                         text-white font-semibold py-3 px-6 rounded-lg
                         transform hover:scale-105 transition-all duration-300
                         shadow-lg hover:shadow-xl
                         flex items-center justify-center gap-2">
            <i class="fas fa-bolt text-lightning"></i>
            Añadir Rápido
          </button>
        </form>
      </div>

      <!-- Filters -->
      <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700">
        <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
          <i class="fas fa-filter text-primary-500"></i>
          Filtros Rápidos
        </h3>
        
        <!-- Search -->
        <div class="relative mb-4">
          <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
          <input type="text" 
                 id="search-input" 
                 placeholder="Buscar tareas..."
                 class="w-full pl-10 pr-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-lg 
                        bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100
                        focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>
        
        <!-- Status Filters -->
        <div class="space-y-2 mb-4">
          <p class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase">Por Estado</p>
          <div class="space-y-1">
            <button data-filter="all" class="filter-btn active w-full text-left px-3 py-2 rounded-lg transition-all duration-300">Todas</button>
            <button data-filter="pending" class="filter-btn w-full text-left px-3 py-2 rounded-lg transition-all duration-300">Pendientes</button>
            <button data-filter="completed" class="filter-btn w-full text-left px-3 py-2 rounded-lg transition-all duration-300">Completadas</button>
          </div>
        </div>
        
        <!-- Category Filters -->
        <div class="space-y-2">
          <p class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase">Por Categoría</p>
          <div class="space-y-1">
            <button data-category="all" class="category-btn active w-full text-left px-3 py-2 rounded-lg transition-all duration-300">Todas</button>
            <button data-category="personal" class="category-btn w-full text-left px-3 py-2 rounded-lg transition-all duration-300">👤 Personal</button>
            <button data-category="trabajo" class="category-btn w-full text-left px-3 py-2 rounded-lg transition-all duration-300">💼 Trabajo</button>
            <button data-category="hogar" class="category-btn w-full text-left px-3 py-2 rounded-lg transition-all duration-300">🏠 Hogar</button>
            <button data-category="salud" class="category-btn w-full text-left px-3 py-2 rounded-lg transition-all duration-300">🏥 Salud</button>
            <button data-category="estudios" class="category-btn w-full text-left px-3 py-2 rounded-lg transition-all duration-300">📚 Estudios</button>
          </div>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700">
        <div class="space-y-2">
          <button id="export-tasks" 
                  class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2.5 px-4 rounded-lg
                         transition-all duration-300 hover:scale-105 shadow-md hover:shadow-lg
                         flex items-center justify-center gap-2">
            <i class="fas fa-file-export"></i>
            Exportar Tareas
          </button>
          <button id="clear-completed" 
                  class="w-full bg-red-500 hover:bg-red-600 text-white py-2.5 px-4 rounded-lg
                         transition-all duration-300 hover:scale-105 shadow-md hover:shadow-lg
                         flex items-center justify-center gap-2">
            <i class="fas fa-broom"></i>
            Limpiar Completadas
          </button>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <section class="flex-1">
      <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 p-6">
        
        <!-- Header -->
        <div class="flex justify-between items-center mb-6 pb-4 border-b border-gray-200 dark:border-gray-700">
          <h2 class="text-2xl font-bold text-primary-600 dark:text-primary-400">
            ⚡ Mis Tareas Rápidas
          </h2>
          
          <!-- View Toggle -->
          <div class="flex gap-1">
            <button data-view="grid" class="view-btn active p-2 rounded-lg transition-all duration-300">
              <i class="fas fa-th-large"></i>
            </button>
            <button data-view="list" class="view-btn p-2 rounded-lg transition-all duration-300">
              <i class="fas fa-list"></i>
            </button>
          </div>
        </div>
        
        <!-- Tasks Container -->
        <div id="task-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
          
          <!-- Empty State -->
          <div id="empty-state" class="col-span-full text-center py-16">
            <i class="fas fa-bolt text-6xl text-lightning mb-4 animate-pulse"></i>
            <h3 class="text-xl font-semibold text-gray-700 dark:text-gray-300 mb-2">
              ¡Empieza a ser productivo!
            </h3>
            <p class="text-gray-500 dark:text-gray-400">
              Añade tu primera tarea rápida ⚡
            </p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Edit Modal -->
  <div id="edit-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-11/12 max-w-md border border-gray-200 dark:border-gray-700 transform scale-95 transition-transform duration-300">
      
      <!-- Modal Header -->
      <div class="bg-gradient-to-r from-primary-500 to-primary-600 text-white p-4 rounded-t-xl flex justify-between items-center">
        <h3 class="text-lg font-bold flex items-center gap-2">
          <i class="fas fa-bolt text-lightning"></i>
          Editar Tarea
        </h3>
        <button class="close-modal text-2xl hover:text-lightning transition-colors duration-300">
          <i class="fas fa-times"></i>
        </button>
      </div>
      
      <!-- Modal Body -->
      <form id="edit-form" class="p-6 space-y-4">
        <input type="hidden" id="edit-task-id">
        
        <div>
          <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
            Título de la tarea
          </label>
          <input type="text" 
                 id="edit-task-input" 
                 class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg 
                        bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100
                        focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                 required>
        </div>
        
        <div>
          <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
            Prioridad
          </label>
          <select id="edit-task-priority" 
                  class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg 
                         bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100
                         focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
            <option value="alta">🔴 Alta</option>
            <option value="media">⚡ Media</option>
            <option value="baja">🟢 Baja</option>
          </select>
        </div>
        
        <div>
          <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
            Categoría
          </label>
          <select id="edit-task-category" 
                  class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg 
                         bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100
                         focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
            <option value="personal">👤 Personal</option>
            <option value="trabajo">💼 Trabajo</option>
            <option value="hogar">🏠 Hogar</option>
            <option value="salud">🏥 Salud</option>
            <option value="estudios">📚 Estudios</option>
          </select>
        </div>
        
        <!-- Modal Actions -->
        <div class="flex gap-3 justify-end pt-4">
          <button type="button" 
                  class="cancel-edit px-4 py-2 bg-gray-500 hover:bg-gray-600 text-white rounded-lg transition-all duration-300">
            Cancelar
          </button>
          <button type="submit" 
                  class="px-4 py-2 bg-gradient-to-r from-primary-500 to-primary-600 
                         hover:from-primary-600 hover:to-primary-700 text-white rounded-lg
                         transition-all duration-300 flex items-center gap-2">
            <i class="fas fa-bolt text-lightning"></i>
            Guardar
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Notification -->
  <div id="notification" 
       class="fixed top-6 right-6 z-50 px-6 py-4 rounded-lg text-white font-semibold
              transform translate-x-full opacity-0 transition-all duration-500
              flex items-center gap-3">
    <i id="notification-icon"></i>
    <span id="notification-message"></span>
  </div>

  <script src="app.js"></script>
  
  <script>
    // Theme Toggle Functionality
    const themeToggle = document.getElementById('theme-toggle');
    const html = document.documentElement;
    
    // Check for saved theme or default to light
    const savedTheme = localStorage.getItem('theme') || 'light';
    html.classList.toggle('dark', savedTheme === 'dark');
    
    themeToggle.addEventListener('click', () => {
      const isDark = html.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });
    
    // Filter and Category Button Styles
    document.addEventListener('DOMContentLoaded', () => {
      const style = document.createElement('style');
      style.textContent = `
        .filter-btn, .category-btn, .view-btn {
          @apply bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 hover:bg-primary-100 dark:hover:bg-primary-900 hover:text-primary-700 dark:hover:text-primary-300;
        }
        .filter-btn.active, .category-btn.active, .view-btn.active {
          @apply bg-primary-500 text-white hover:bg-primary-600;
        }
      `;
      document.head.appendChild(style);
    });
  </script>
</body>
</html>
